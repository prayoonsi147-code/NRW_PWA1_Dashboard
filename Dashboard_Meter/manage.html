<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จัดการแหล่งข้อมูล — Dashboard มาตรวัดน้ำ</title>
    <script>
        if (location.protocol === 'file:') {
            location.href = 'http://localhost:5003/manage.html';
        }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #f3e5f5 0%, #ede7f6 100%);
            color: #333;
            min-height: 100vh;
            padding: 20px;
            transition: background .3s, color .3s;
        }

        /* ── Dark Mode ── */
        body.dark {
            background: linear-gradient(135deg, #1a0a30 0%, #2a1050 100%);
            color: #e0e0e0;
        }
        body.dark .header { background: linear-gradient(135deg, #1a0a30, #4a148c); }
        body.dark .header .back-btn { background: rgba(255,255,255,.1); border-color: rgba(255,255,255,.25); }
        body.dark .upload-section,
        body.dark .management-panel,
        body.dark .upload-log { background: #16213e; box-shadow: 0 2px 8px rgba(0,0,0,.3); }
        body.dark .upload-tabs { background: #1a2a4a; border-bottom-color: #2a2a4a; }
        body.dark .upload-tab { color: #ce93d8; }
        body.dark .upload-tab:hover { background: rgba(255,255,255,.05); color: #e0e0e0; }
        body.dark .upload-tab .tab-count { background: rgba(255,255,255,.08); color: #ce93d8; }
        body.dark .drop-zone { background: #1a2a4a; border-color: #2a2a4a; }
        body.dark .drop-zone-text, body.dark .drop-zone-hint { color: #ce93d8; }
        body.dark .upload-hint { background: #1a2a4a; border-color: #2a2a4a; color: #ce93d8; }
        body.dark .upload-hint summary { color: #e0e0e0; }
        body.dark .upload-hint code { background: #2d1545; color: #ce93d8; }
        body.dark .upload-hint .hint-tag { background: rgba(142,36,170,.15); color: #ce93d8; }
        body.dark .mode-radio label { color: #e0e0e0; }
        body.dark .form-group label { color: #ce93d8; }
        body.dark .form-group select { background: #1a2a4a; border-color: #2a2a4a; color: #e0e0e0; }
        body.dark .btn-primary { background: #7b1fa2; }
        body.dark .btn-primary:hover:not(:disabled) { background: #9c27b0; box-shadow: 0 4px 12px rgba(123,31,162,.3); }
        body.dark .btn-secondary { background: #1a2a4a; color: #e0e0e0; border-color: #2a2a4a; }
        body.dark .section-title { color: #ce93d8; }
        body.dark .chip { border-color: #2a2a4a; }
        body.dark .chip-label { color: #ce93d8; }
        body.dark .chip-delete { color: #ef5350; }
        body.dark .log-content { background: #1a2a4a; border-color: #2a2a4a; color: #ce93d8; }
        body.dark .log-entry { border-bottom-color: #2a2a4a; }
        body.dark .modal-content { background: #16213e; color: #e0e0e0; }
        body.dark .modal-message { color: #ce93d8; }
        body.dark .upload-status.success { background: rgba(46,125,50,.2); color: #81c784; border-color: rgba(129,199,132,.3); }
        body.dark .upload-status.error { background: rgba(198,40,40,.2); color: #ef5350; border-color: rgba(239,83,80,.3); }
        body.dark .upload-status.loading { background: rgba(123,31,162,.2); color: #ce93d8; border-color: rgba(206,147,216,.3); }
        body.dark .edit-table th { background: #1a2a4a; color: #ce93d8; }
        body.dark .edit-table td { border-color: #2a2a4a; }

        /* Theme Toggle */
        .theme-toggle { display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; }
        .theme-switch { width: 44px; height: 24px; background: rgba(255,255,255,.25); border-radius: 12px; position: relative; transition: background .3s; }
        .theme-switch::after { content: ''; position: absolute; top: 2px; left: 2px; width: 20px; height: 20px; background: #fff; border-radius: 50%; transition: transform .3s; box-shadow: 0 1px 3px rgba(0,0,0,.2); }
        body.dark .theme-switch { background: rgba(206,147,216,.4); }
        body.dark .theme-switch::after { transform: translateX(20px); background: #ce93d8; }
        .theme-icon { font-size: 16px; color: rgba(255,255,255,.7); }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #4a148c 0%, #8e24aa 100%);
            color: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 12px rgba(74, 20, 140, 0.2);
        }

        .header-content h1 {
            font-size: 28px;
            font-weight: 600;
            margin: 0;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateX(-4px);
        }

        /* Upload Section */
        .upload-section {
            background: white;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #4a148c;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Upload Tabs */
        .upload-tabs {
            display: flex;
            background: #f5f5f5;
            border-bottom: 2px solid #e0e0e0;
            overflow-x: auto;
        }

        .upload-tab {
            flex: 1;
            padding: 12px 16px;
            border: none;
            background: transparent;
            font-size: 13px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            color: #888;
            position: relative;
            min-width: 120px;
        }

        .upload-tab:hover {
            background: rgba(0,0,0,0.04);
            color: #555;
        }

        .upload-tab.active {
            color: #fff;
        }

        .upload-tab.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 3px;
        }

        .upload-tab .tab-count {
            font-size: 11px;
            padding: 1px 7px;
            border-radius: 10px;
            background: rgba(0,0,0,0.08);
            color: #666;
        }

        .upload-tab.active .tab-count {
            background: rgba(255,255,255,0.3);
            color: #fff;
        }

        .upload-tab-panel {
            display: none;
            padding: 20px 25px;
        }

        .upload-tab-panel.active {
            display: block;
        }

        /* Drop Zone */
        .drop-zone {
            border: 2px dashed #ccc;
            border-radius: 10px;
            padding: 25px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #fafafa;
            margin-bottom: 15px;
        }

        .drop-zone {
            border-color: #ce93d8;
            background: #f3e5f5;
        }

        .drop-zone.dragover {
            border-color: #333;
            background: #f0f0f0;
            transform: scale(1.01);
        }

        .drop-zone-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .drop-zone-icon {
            font-size: 24px;
        }

        .drop-zone-text {
            font-size: 13px;
            color: #666;
        }

        .drop-zone-hint {
            font-size: 11px;
            color: #999;
        }

        .file-input {
            display: none;
        }

        /* Upload Hints */
        .upload-hint {
            margin-top: -8px;
            margin-bottom: 14px;
            font-size: 12px;
            line-height: 1.6;
            color: #666;
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 10px 14px;
        }

        .upload-hint summary {
            cursor: pointer;
            font-weight: 600;
            color: #555;
            font-size: 12px;
        }

        .upload-hint summary:hover { color: #333; }

        .upload-hint .hint-body {
            margin-top: 8px;
        }

        .upload-hint .hint-label {
            font-weight: 600;
            color: #444;
        }

        .upload-hint code {
            background: #e8e8e8;
            padding: 1px 5px;
            border-radius: 3px;
            font-size: 11px;
            font-family: 'Consolas', 'Monaco', monospace;
        }

        .upload-hint .hint-example {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin: 4px 0 6px;
        }

        .upload-hint .hint-tag {
            background: #f3e5f5;
            color: #6a1b9a;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 11px;
            font-family: 'Consolas', 'Monaco', monospace;
        }

        .upload-hint .hint-note {
            color: #888;
            font-size: 11px;
            font-style: italic;
        }

        /* Upload Status */
        .upload-status {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 12px;
            display: none;
            font-size: 12px;
        }

        .upload-status.show {
            display: block;
        }

        .upload-status.success {
            background: #c8e6c9;
            color: #1b5e20;
            border: 1px solid #81c784;
        }

        .upload-status.error {
            background: #ffcdd2;
            color: #b71c1c;
            border: 1px solid #ef5350;
        }

        .upload-status.loading {
            background: #f3e5f5;
            color: #6a1b9a;
            border: 1px solid #ce93d8;
        }

        /* Buttons */
        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .btn-primary {
            background: #8e24aa;
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: #6a1b9a;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(142, 36, 170, 0.3);
        }

        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            border: 1px solid #ddd;
        }

        .btn-secondary:hover {
            background: #e8e8e8;
        }

        .btn-danger {
            background: #d32f2f;
            color: white;
        }

        .btn-danger:hover {
            background: #c62828;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(198, 40, 40, 0.3);
        }

        /* Management Panel */
        .management-panel {
            background: white;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .category-section {
            margin-bottom: 20px;
        }

        .category-section-title {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 10px;
            padding: 6px 14px;
            border-radius: 6px;
            display: inline-block;
        }

        .file-chips {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-bottom: 12px;
        }

        .year-group {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 5px;
            margin-bottom: 8px;
        }

        .year-label {
            font-size: 12px;
            font-weight: 700;
            color: #fff;
            padding: 3px 10px;
            border-radius: 4px;
            margin-right: 4px;
            min-width: 44px;
            text-align: center;
        }

        .chip {
            border: 1.5px solid;
            border-radius: 4px;
            padding: 3px 8px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            font-weight: 500;
            color: #333;
            transition: all 0.15s ease;
            background: #f3e5f5;
            border-color: #8e24aa;
        }

        .chip:hover {
            transform: translateY(-1px);
            box-shadow: 0 2px 6px rgba(0,0,0,0.12);
        }

        .chip-label {
            font-weight: 600;
            font-size: 11px;
            color: #6a1b9a;
        }

        .chip-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 12px;
            padding: 1px 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 3px;
            transition: all 0.15s ease;
            line-height: 1;
        }

        .chip-delete {
            color: #d32f2f;
            font-size: 13px;
        }

        .chip-delete:hover {
            background: #ffebee;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        /* Upload Log */
        .upload-log {
            background: white;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .log-content {
            background: #f5f5f5;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            max-height: 250px;
            overflow-y: auto;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.5;
            color: #333;
        }

        .log-entry {
            padding: 5px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .log-entry:last-child {
            border-bottom: none;
        }

        .log-time {
            color: #999;
            margin-right: 10px;
        }

        .log-success {
            color: #1b5e20;
        }

        .log-error {
            color: #b71c1c;
        }

        .log-info {
            color: #6a1b9a;
        }

        /* Footer Actions */
        .footer-actions {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        /* Modal Dialog */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 30px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #333;
        }

        .modal-message {
            font-size: 14px;
            color: #666;
            margin-bottom: 25px;
            line-height: 1.5;
            white-space: pre-line;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 20px;
                text-align: center;
            }

            .header-content h1 {
                font-size: 22px;
            }

            .button-group {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }

            .drop-zone {
                padding: 25px;
            }

            .modal-content {
                max-width: 90%;
            }
        }

        /* Loading Spinner */
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #8e24aa;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-content">
                <h1>จัดการแหล่งข้อมูล — Dashboard มาตรวัดน้ำ</h1>
            </div>
            <div style="display:flex;align-items:center;gap:12px">
                <button class="back-btn" id="backBtn" onclick="goBack()">← กลับหน้า Dashboard</button>
                <div class="theme-toggle" onclick="toggleTheme()">
                    <span class="theme-icon">&#9788;</span>
                    <div class="theme-switch"></div>
                    <span class="theme-icon">&#9790;</span>
                </div>
            </div>
        </div>

        <!-- Upload Section — Tabbed -->
        <div class="upload-section">
            <div class="upload-tabs" id="uploadTabs">
                <button class="upload-tab active" data-category="abnormal" onclick="switchTab('abnormal')">
                    🔍 มาตรวัดน้ำผิดปกติ <span class="tab-count" id="abnormal-count">-</span>
                </button>
            </div>

            <!-- Upload Panels (1 category) -->
            <div id="upload-panels"></div>
        </div>

        <!-- Management Panel -->
        <div class="management-panel">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
                <h2 class="section-title" style="margin-bottom:0">📂 ข้อมูลปัจจุบัน</h2>
                <button class="btn btn-secondary" onclick="openFolder()" style="font-size:12px;padding:6px 14px;display:inline-flex;align-items:center;gap:5px">
                    📂 เปิดโฟลเดอร์ข้อมูล
                </button>
            </div>
            <div id="management-content"></div>
        </div>

        <!-- Upload Log -->
        <div class="upload-log">
            <h2 class="section-title">📝 ประวัติการอัปโหลด</h2>
            <div class="log-content" id="logContent">
                <div class="empty-state" style="padding: 20px;">ยังไม่มีการอัปโหลดไฟล์</div>
            </div>
        </div>

    </div>

    <!-- Confirmation Modal -->
    <div class="modal" id="confirmModal">
        <div class="modal-content">
            <div class="modal-title" id="confirmTitle">ยืนยัน</div>
            <div class="modal-message" id="confirmMessage"></div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeConfirmDialog()">ยกเลิก</button>
                <button class="btn btn-primary" onclick="confirmAction()">ตกลง</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        const CATEGORIES = {
            'abnormal': { thai: 'มาตรวัดน้ำผิดปกติ', icon: '🔍', color: '#8e24aa', dark: '#4a148c',
                hint: 'ไฟล์ข้อมูลมาตรวัดน้ำผิดปกติ แยกรายสาขา (22 ไฟล์) เช่น <code>ABNORMAL_METER_1102 ชลบุรี.xlsx</code>' }
        };

        let currentCategory = 'abnormal';
        let cachedData = {};
        let confirmCallback = null;

        // ─── Initialization ───────────────────────────────────────────────────

        document.addEventListener('DOMContentLoaded', async () => {
            initTheme();
            createUploadPanels();
            setupEventListeners();
            switchTab('abnormal'); // apply initial tab color
            await loadData();
        });

        function initTheme() {
            if (localStorage.getItem('meterTheme') === 'dark') {
                document.body.classList.add('dark');
            }
        }

        function toggleTheme() {
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            localStorage.setItem('meterTheme', isDark ? 'dark' : 'bright');
        }

        function goBack() {
            window.location.href = '/';
        }

        // ─── Create Upload Panels ─────────────────────────────────────────────

        function createUploadPanels() {
            const container = document.getElementById('upload-panels');

            Object.keys(CATEGORIES).forEach(slug => {
                const cat = CATEGORIES[slug];
                const panel = document.createElement('div');
                panel.className = 'upload-tab-panel' + (slug === 'abnormal' ? ' active' : '');
                panel.id = `panel-${slug}`;
                panel.innerHTML = `
                    <div style="margin-bottom:14px">
                        <label style="display:block;font-size:13px;font-weight:600;color:${cat.color};margin-bottom:6px">
                            📅 วันที่ดึงข้อมูลจาก CIS Support <span style="color:#d32f2f">*</span>
                        </label>
                        <div style="display:flex;align-items:center;gap:10px">
                            <input type="date" id="dataDate-${slug}" style="padding:8px 12px;border:2px solid ${cat.color}40;border-radius:8px;font-size:14px;font-family:inherit;outline:none;transition:border-color .2s;background:var(--card,#fff);color:var(--text,#333)" onfocus="this.style.borderColor='${cat.color}'" onblur="this.style.borderColor='${cat.color}40'">
                            <span style="font-size:12px;color:#888">(พ.ศ. จะแปลงอัตโนมัติ)</span>
                        </div>
                    </div>

                    <div class="drop-zone" id="dropZone-${slug}" style="border-color:${cat.color}40;background:${cat.color}08">
                        <div class="drop-zone-content">
                            <div class="drop-zone-icon">${cat.icon}</div>
                            <div class="drop-zone-text">ลากไฟล์มาวาง หรือคลิกเลือกไฟล์ &nbsp;<span class="drop-zone-hint">(.xlsx, .xls, .csv) เลือกได้หลายไฟล์</span></div>
                        </div>
                        <input type="file" id="fileInput-${slug}" class="file-input" accept=".xlsx,.xls,.csv" multiple>
                        <div id="fileList-${slug}" style="margin-top:10px;padding-top:10px;border-top:1px dashed ${cat.color}40;display:none"></div>
                    </div>

                    <div class="note-box" style="margin-top:12px">
                        <label for="noteBox-${slug}" style="font-size:13px;font-weight:600;color:var(--sub,#666);display:flex;align-items:center;gap:5px;margin-bottom:6px">
                            &#9997; บันทึกช่วยจำ (${cat.thai})
                            <span id="noteSaved-${slug}" style="font-size:11px;color:#2e7d32;opacity:0;transition:opacity .3s;margin-left:auto">&#10003; บันทึกแล้ว</span>
                        </label>
                        <textarea id="noteBox-${slug}" placeholder="พิมพ์บันทึกช่วยจำ เช่น รูปแบบไฟล์ที่ใช้, แหล่งข้อมูล, หมายเหตุ..."
                            style="width:100%;min-height:80px;padding:10px 14px;border:2px solid ${cat.color}30;border-radius:8px;font-size:13px;font-family:inherit;resize:vertical;background:var(--card,#fff);color:var(--text,#333);transition:border-color .3s;outline:none"
                            onfocus="this.style.borderColor='${cat.color}'" onblur="this.style.borderColor='${cat.color}30'"></textarea>
                    </div>

                    <div class="upload-status" id="uploadStatus-${slug}"></div>

                    <div class="button-group">
                        <button class="btn btn-primary" id="uploadBtn-${slug}" disabled>อัปโหลดไฟล์</button>
                    </div>
                `;
                container.appendChild(panel);
            });
        }

        // Note auto-save (debounce 800ms)
        const _noteTimers = {};
        function setupNoteAutoSave(slug) {
            const textarea = document.getElementById(`noteBox-${slug}`);
            const savedEl = document.getElementById(`noteSaved-${slug}`);
            if (!textarea) return;
            textarea.addEventListener('input', () => {
                clearTimeout(_noteTimers[slug]);
                savedEl.style.opacity = '0';
                _noteTimers[slug] = setTimeout(async () => {
                    try {
                        await fetch(`${API_BASE}/api/notes/${slug}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ text: textarea.value })
                        });
                        savedEl.style.opacity = '1';
                        setTimeout(() => { savedEl.style.opacity = '0'; }, 2000);
                    } catch (e) { console.error('Note save error:', e); }
                }, 800);
            });
        }

        function setupEventListeners() {
            Object.keys(CATEGORIES).forEach(slug => {
                // Note auto-save
                setupNoteAutoSave(slug);

                // Drop zone
                const dropZone = document.getElementById(`dropZone-${slug}`);
                const fileInput = document.getElementById(`fileInput-${slug}`);
                const uploadBtn = document.getElementById(`uploadBtn-${slug}`);

                dropZone.addEventListener('click', () => fileInput.click());

                dropZone.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    dropZone.classList.add('dragover');
                });

                dropZone.addEventListener('dragleave', () => {
                    dropZone.classList.remove('dragover');
                });

                dropZone.addEventListener('drop', (e) => {
                    e.preventDefault();
                    dropZone.classList.remove('dragover');
                    fileInput.files = e.dataTransfer.files;
                    fileInput.dispatchEvent(new Event('change'));
                });

                // File list state
                if (!window._fileStore) window._fileStore = {};
                window._fileStore[slug] = [];

                window.renderFileList = function renderFileList(s) {
                    const files = window._fileStore[s];
                    const listEl = document.getElementById(`fileList-${s}`);
                    const fi = document.getElementById(`fileInput-${s}`);
                    const ub = document.getElementById(`uploadBtn-${s}`);
                    const c = CATEGORIES[s];
                    if (files.length > 0) {
                        let html = '<div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center">';
                        html += '<span style="font-size:12px;color:var(--sub);font-weight:600">ไฟล์ที่เลือก (' + files.length + '):</span>';
                        files.forEach((f, i) => {
                            const sizeKB = (f.size / 1024).toFixed(1);
                            const sizeMB = (f.size / 1024 / 1024).toFixed(2);
                            const sizeStr = f.size >= 1048576 ? sizeMB + ' MB' : sizeKB + ' KB';
                            html += `<span style="display:inline-flex;align-items:center;gap:4px;background:${c.color}15;border:1px solid ${c.color}40;border-radius:6px;padding:3px 10px;font-size:12px;color:var(--text)">📄 ${f.name} <span style="color:var(--sub2);font-size:11px">(${sizeStr})</span><button onclick="removeFile('${s}',${i})" style="background:none;border:none;cursor:pointer;color:#e74c3c;font-size:15px;line-height:1;padding:0 0 0 4px" title="ลบไฟล์นี้">&times;</button></span>`;
                        });
                        html += '</div>';
                        listEl.innerHTML = html;
                        listEl.style.display = 'block';
                    } else {
                        listEl.style.display = 'none';
                        listEl.innerHTML = '';
                    }
                    const dt = new DataTransfer();
                    files.forEach(f => dt.items.add(f));
                    fi.files = dt.files;
                    ub.disabled = files.length === 0;
                }

                window.removeFile = function(s, idx) {
                    window._fileStore[s].splice(idx, 1);
                    renderFileList(s);
                };

                // File input change
                fileInput.addEventListener('change', () => {
                    const newFiles = Array.from(fileInput.files);
                    const existing = window._fileStore[slug];
                    newFiles.forEach(f => {
                        if (!existing.some(e => e.name === f.name && e.size === f.size)) {
                            existing.push(f);
                        }
                    });
                    renderFileList(slug);
                });

                // Upload button
                uploadBtn.addEventListener('click', () => uploadFiles(slug));
            });
        }

        // ─── Tab Switching ────────────────────────────────────────────────────

        function switchTab(slug) {
            currentCategory = slug;
            const cat = CATEGORIES[slug];

            // Update active tab + color
            document.querySelectorAll('.upload-tab').forEach(btn => {
                btn.classList.remove('active');
                btn.style.background = '';
            });
            const activeBtn = document.querySelector(`[data-category="${slug}"]`);
            activeBtn.classList.add('active');
            activeBtn.style.background = `linear-gradient(135deg, ${cat.dark || cat.color}, ${cat.color})`;

            // Update active panel
            document.querySelectorAll('.upload-tab-panel').forEach(panel => {
                panel.classList.remove('active');
            });
            document.getElementById(`panel-${slug}`).classList.add('active');
        }

        // ─── Upload Files ─────────────────────────────────────────────────────

        async function uploadFiles(slug) {
            const store = window._fileStore[slug] || [];

            if (store.length === 0) {
                showStatus(slug, 'โปรดเลือกไฟล์', 'error');
                return;
            }

            // ตรวจสอบว่ากรอกวันที่แล้ว
            const dateInput = document.getElementById(`dataDate-${slug}`);
            if (!dateInput.value) {
                showStatus(slug, 'กรุณาระบุวันที่ดึงข้อมูลจาก CIS Support ก่อนอัปโหลด', 'error');
                dateInput.focus();
                dateInput.style.borderColor = '#d32f2f';
                setTimeout(() => { dateInput.style.borderColor = ''; }, 3000);
                return;
            }

            // แปลงวันที่แสดงให้ผู้ใช้เห็น
            const ceDate = dateInput.value;
            const parts = ceDate.split('-');
            const beYear = parseInt(parts[0]) + 543;
            const thMonths = ['','มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
            const dateDisplay = `${parseInt(parts[2])} ${thMonths[parseInt(parts[1])]} ${beYear}`;

            let fileList = store.map(f => f.name).join(', ');
            let confirmMsg = `วันที่ข้อมูล: ${dateDisplay}\nอัปโหลด ${store.length} ไฟล์:\n${fileList}`;

            showConfirmDialog(
                'ยืนยันการอัปโหลด',
                confirmMsg,
                async () => {
                    await performUpload(slug, store);
                }
            );
        }

        async function performUpload(slug, files) {
            const formData = new FormData();
            files.forEach(file => {
                formData.append('files', file);
            });

            // ส่งวันที่ดึงข้อมูล — แปลง ค.ศ. → พ.ศ.
            const dateInput = document.getElementById(`dataDate-${slug}`);
            const ceDate = dateInput.value; // "2026-01-16" (ค.ศ.)
            if (ceDate) {
                const parts = ceDate.split('-');
                const beYear = parseInt(parts[0]) + 543;
                formData.append('data_date', `${beYear}-${parts[1]}-${parts[2]}`);
            }

            showStatus(slug, 'กำลังอัปโหลด...', 'loading');

            try {
                const response = await fetch(`${API_BASE}/api/upload/${slug}`, {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.error || 'Upload failed');
                }

                const errors = result.errors || [];
                const successes = result.results || [];

                if (errors.length > 0) {
                    const failMsg = errors.map(e => `${e.filename}: ${e.error}`).join('\n');
                    showStatus(slug, `${successes.length} ไฟล์สำเร็จ, ${errors.length} ไฟล์ล้มเหลว`, 'error');
                    addLog(`Upload ${slug} บางส่วนล้มเหลว:\n${failMsg}`, 'error');
                } else {
                    const names = files.map(f => f.name).join(', ');
                    showStatus(slug, `อัปโหลดสำเร็จ ${successes.length} ไฟล์`, 'success');
                    addLog(`Upload ${slug} สำเร็จ (${names})`, 'success');
                }

                // Clear file store + input + file list UI
                window._fileStore[slug] = [];
                document.getElementById(`fileInput-${slug}`).value = '';
                document.getElementById(`uploadBtn-${slug}`).disabled = true;
                renderFileList(slug);

                // Reload data
                await loadData();
                // Signal main dashboard to refresh
                try { localStorage.setItem('dashboard_updated', Date.now().toString()); } catch(e){}
            } catch (error) {
                showStatus(slug, `ข้อผิดพลาด: ${error.message}`, 'error');
                addLog(`Upload ${slug} ล้มเหลว: ${error.message}`, 'error');
            }
        }

        function showStatus(slug, message, type) {
            const statusEl = document.getElementById(`uploadStatus-${slug}`);
            statusEl.textContent = message;
            statusEl.className = `upload-status show ${type}`;
        }

        // ─── Load Data ────────────────────────────────────────────────────────

        async function loadData() {
            try {
                const response = await fetch(`${API_BASE}/api/data`);
                if (!response.ok) {
                    throw new Error('Failed to load data');
                }

                const data = await response.json();
                cachedData = data.inventory || {};

                // Update tab counts
                Object.keys(CATEGORIES).forEach(slug => {
                    const count = cachedData[slug]?.count || 0;
                    document.getElementById(`${slug}-count`).textContent = count;
                });

                // Load saved notes
                const notes = data.notes || {};
                Object.keys(notes).forEach(slug => {
                    const el = document.getElementById(`noteBox-${slug}`);
                    if (el) el.value = notes[slug];
                });

                // Render management panel
                renderManagementPanel();

                addLog('โหลดข้อมูลจากเซิร์ฟเวอร์สำเร็จ', 'info');
            } catch (error) {
                addLog(`ข้อผิดพลาด: ${error.message}`, 'error');
            }
        }

        const BRANCH_CODE_MAP = {
            "1102":"ชลบุรี(พ)","1103":"พัทยา(พ)","1104":"บ้านบึง","1105":"พนัสนิคม",
            "1106":"ศรีราชา","1107":"แหลมฉบัง","1108":"ฉะเชิงเทรา","1109":"บางปะกง",
            "1110":"บางคล้า","1111":"พนมสารคาม","1112":"ระยอง","1113":"บ้านฉาง",
            "1114":"ปากน้ำประแสร์","1115":"จันทบุรี","1116":"ขลุง","1117":"ตราด",
            "1118":"คลองใหญ่","1119":"สระแก้ว","1120":"วัฒนานคร","1121":"อรัญประเทศ",
            "1122":"ปราจีนบุรี","1123":"กบินทร์บุรี"
        };

        // ดึง chip label: METER_1102.xlsx → "ชลบุรี(พ)"
        function extractChipLabel(slug, filename) {
            const name = filename.replace(/\.[^.]+$/, '');
            const m = name.match(/METER_(\d+)/);
            if (m) return BRANCH_CODE_MAP[m[1]] || m[1];
            return name;
        }

        function renderManagementPanel() {
            const container = document.getElementById('management-content');
            container.innerHTML = '';

            let hasData = false;

            Object.keys(CATEGORIES).forEach(slug => {
                const cat = CATEGORIES[slug];
                const catData = cachedData[slug];
                if (!catData) return;

                const files = catData.files || [];
                if (files.length === 0) return;

                hasData = true;

                const lastMod = catData.last_modified;
                const section = document.createElement('div');
                section.className = 'category-section';
                section.innerHTML = `
                    <div class="category-section-title" style="background: linear-gradient(135deg, ${cat.dark || cat.color}, ${cat.color});">
                        ${cat.icon} ${cat.thai} (${files.length})
                    </div>
                    ${lastMod ? `<span style="font-size:11px;color:#888;margin-left:4px">อัปเดตล่าสุด: ${lastMod}</span>` : ''}
                    <div class="file-chips" id="chips-${slug}"></div>
                `;
                container.appendChild(section);

                const chipsDiv = section.querySelector(`#chips-${slug}`);

                // Meter files = branch codes → 1 group "สาขา"
                const group = document.createElement('div');
                group.className = 'year-group';

                const groupLabel = document.createElement('span');
                groupLabel.className = 'year-label';
                groupLabel.style.background = cat.dark || cat.color;
                groupLabel.textContent = 'สาขา';
                group.appendChild(groupLabel);

                files.forEach(filename => {
                    const chip = document.createElement('div');
                    chip.className = 'chip';
                    chip.style.borderColor = cat.color + '60';
                    chip.style.background = cat.color + '0a';
                    const label = extractChipLabel(slug, filename);
                    chip.innerHTML = `
                        <span class="chip-label" style="color:${cat.color}">${label}</span>
                        <button class="chip-btn chip-delete" title="ลบ ${filename}" onclick="deleteFile('${slug}', '${filename.replace(/'/g,"\\'")}')">✕</button>
                    `;
                    chip.title = filename;
                    group.appendChild(chip);
                });

                chipsDiv.appendChild(group);
            });

            if (!hasData) {
                container.innerHTML = '<div class="empty-state">📭 ไม่มีไฟล์ข้อมูลอยู่</div>';
            }
        }

        async function deleteFile(slug, filename) {
            showConfirmDialog(
                'ยืนยันการลบไฟล์',
                `คุณต้องการลบ ${filename} หรือไม่?`,
                async () => {
                    try {
                        const response = await fetch(`${API_BASE}/api/data/${slug}/${encodeURIComponent(filename)}`, {
                            method: 'DELETE'
                        });

                        if (!response.ok) {
                            throw new Error('Delete failed');
                        }

                        addLog(`ลบไฟล์สำเร็จ: ${filename}`, 'success');
                        await loadData();
                        try { localStorage.setItem('dashboard_updated', Date.now().toString()); } catch(e){}
                    } catch (error) {
                        addLog(`ลบไฟล์ล้มเหลว: ${error.message}`, 'error');
                    }
                }
            );
        }

        // ─── Folder Operations ────────────────────────────────────────────────

        async function openFolder() {
            try {
                await fetch(`${API_BASE}/api/open-folder`, { method: 'POST' });
                addLog('เปิดโฟลเดอร์ข้อมูลสำเร็จ', 'info');
            } catch (error) {
                addLog(`เปิดโฟลเดอร์ล้มเหลว: ${error.message}`, 'error');
            }
        }

        // rebuildDashboard() — ลบแล้ว (ประมวลผลผ่าน index.html โดยตรง)

        // ─── Logging ──────────────────────────────────────────────────────────

        function addLog(message, type = 'info') {
            const logContent = document.getElementById('logContent');
            if (logContent.querySelector('.empty-state')) {
                logContent.innerHTML = '';
            }

            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            const time = new Date().toLocaleTimeString('th-TH');
            entry.innerHTML = `<span class="log-time">[${time}]</span> ${message}`;
            logContent.appendChild(entry);
            logContent.scrollTop = logContent.scrollHeight;
        }

        // ─── Modal Dialogs ────────────────────────────────────────────────────

        function showConfirmDialog(title, message, callback) {
            document.getElementById('confirmTitle').textContent = title;
            document.getElementById('confirmMessage').textContent = message;
            confirmCallback = callback;
            document.getElementById('confirmModal').classList.add('active');
        }

        function closeConfirmDialog() {
            document.getElementById('confirmModal').classList.remove('active');
            confirmCallback = null;
        }

        function confirmAction() {
            if (confirmCallback) {
                confirmCallback();
            }
            closeConfirmDialog();
        }

        // Close modal on background click
        document.getElementById('confirmModal').addEventListener('click', (e) => {
            if (e.target.id === 'confirmModal') {
                closeConfirmDialog();
            }
        });
    </script>
</body>
</html>
