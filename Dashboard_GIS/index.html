(function(){
    var urls=[
        'https://cdn.jsdelivr.net/gh/gitbrent/PptxGenJS@3.12.0/dist/pptxgen.bundle.js',

        'https://unpkg.com/pptxgenjs@3.12.0/dist/pptxgen.bundle.js'
    ];
    var idx=0;
    function tryLoad(){
        if(idx>=urls.length){console.warn('PptxGenJS: all CDN sources failed');return;}
        var s=document.createElement('script');
        s.src=urls[idx];
        s.onload=function(){console.log('PptxGenJS loaded from',urls[idx]);};

    }
    tryLoad();
})();

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:var(--bg);color:var(--text);transition:background .3s,color .3s}
:root{
  --bg:#f0f2f5;--text:#333;--card:#fff;--card-shadow:rgba(0,0,0,.08);--border:#ddd;
  --input-bg:#f8f9fa;--heading:#004d40;--sub:#555;--sub2:#888;--hover:#e0f2f1;
  --th-bg:#f8f9fa;--table-border:#eee;--tag-bg:#e0f2f1;--tag-color:#00695c;
  --tab-hover:#f0f2f5;--info-btn-bg:#e0f2f1;--info-btn-color:#00838f;
  --accent:#00838f;--total-bg:#e0f2f1
}
body.dark{
  --bg:#1a1a2e;--text:#e0e0e0;--card:#16213e;--card-shadow:rgba(0,0,0,.3);--border:#2a2a4a;
  --input-bg:#0f3460;--heading:#4dd0e1;--sub:#aaa;--sub2:#888;--hover:rgba(0,131,143,.15);
  --th-bg:#0f3460;--table-border:#2a2a4a;--tag-bg:rgba(0,131,143,.15);--tag-color:#4dd0e1;
  --tab-hover:rgba(255,255,255,.05);--info-btn-bg:rgba(0,131,143,.2);--info-btn-color:#4dd0e1;
  --accent:#26c6da;--total-bg:rgba(0,131,143,.15)
}
.header{background:linear-gradient(135deg,#004d40,#00838f);color:#fff;padding:24px 32px;text-align:center;position:relative}
.header h1{font-size:24px;margin-bottom:8px}
.header p{opacity:.85;font-size:14px}
.container{max-width:1400px;margin:0 auto;padding:24px}
.info-section{position:relative}
.info-content{transition:max-height .3s ease,opacity .3s ease,margin .3s ease;overflow:hidden}
.info-content.collapsed{max-height:0!important;opacity:0;margin-bottom:0!important}
.file-list{background:var(--card);border-radius:12px;padding:20px 24px;margin-bottom:24px;box-shadow:0 2px 8px var(--card-shadow);transition:background .3s}
.file-list h3{margin-bottom:12px;color:var(--heading);font-size:16px}
.chart-card{background:var(--card);border-radius:12px;padding:24px;box-shadow:0 2px 8px var(--card-shadow);transition:background .3s;margin-bottom:24px}
.chart-card h3{margin-bottom:16px;color:var(--heading);font-size:16px}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.card-header h3{margin-bottom:0}
.card-toggle{background:none;border:1px solid var(--border);border-radius:6px;padding:2px 10px;cursor:pointer;font-size:16px;color:var(--sub);transition:all .15s;line-height:1}
.card-toggle:hover{border-color:var(--accent);color:var(--accent)}
.card-body.collapsed{display:none}
.controls{display:flex;flex-wrap:wrap;gap:16px;align-items:flex-end;margin-bottom:16px;padding:12px 0}
.control-group{display:flex;flex-direction:column;gap:6px}
.control-group label{font-size:13px;font-weight:600;color:var(--sub)}
.control-group select,.control-group input{padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:var(--input-bg);color:var(--text);transition:background .3s,color .3s}
.chart-container{position:relative;width:100%;min-height:200px;height:450px;resize:both;overflow:hidden;border:1px dashed transparent;transition:border-color .2s;cursor:default}
.chart-container:hover{border-color:var(--border)}
.chart-container canvas{width:100%!important;height:100%!important;cursor:grab}
.chart-container canvas:active{cursor:grabbing}
.export-bar{display:flex;gap:6px;justify-content:flex-end;flex-wrap:wrap;margin-top:12px}
.export-btn{display:inline-flex;align-items:center;gap:4px;padding:6px 14px;border:1px solid var(--border);border-radius:6px;background:var(--card);color:var(--sub);cursor:pointer;font-size:13px;transition:all .15s}
.export-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--hover)}
.theme-toggle{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
.theme-toggle span{font-size:13px;color:rgba(255,255,255,.7);font-weight:600}
.theme-switch{width:48px;height:26px;background:rgba(255,255,255,.25);border-radius:13px;position:relative;transition:background .3s}
.theme-switch::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;background:#fff;border-radius:50%;transition:transform .3s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
body.dark .theme-switch{background:rgba(77,208,225,.4)}
body.dark .theme-switch::after{transform:translateX(22px);background:#4dd0e1}
.ymt{display:inline-flex;border:2px solid var(--border);border-radius:8px;overflow:hidden}
.ymb{border:none;padding:6px 16px;cursor:pointer;font-size:13px;font-weight:600;transition:all .15s;background:var(--card);color:var(--sub)}
.ymb.active{background:var(--accent);color:#fff}
.kpi-summary{text-align:center;padding:16px;margin-top:16px;background:linear-gradient(135deg,#004d40,#00838f);border-radius:12px;color:#fff;font-size:18px;font-weight:700}
body.dark .kpi-summary{background:linear-gradient(135deg,#00363a,#005662)}
</style>
</head>
<body>

<div class="header">
  <a href="../index.html" style="position:absolute;left:18px;top:50%;transform:translateY(-50%);text-decoration:none;color:white;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);border-radius:8px;padding:7px 16px;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:6px;transition:background 0.2s" onmouseover="this.style.background='rgba(255,255,255,0.3)'" onmouseout="this.style.background='rgba(255,255,255,0.15)'">&larr; หน้าหลัก</a>
  <h1>Dashboard แผนที่แนวท่อ</h1>
  <p>งานแผนที่แนวท่อ กองระบบจำหน่าย กปภ.ข.1</p>
  <div style="position:absolute;top:50%;right:32px;transform:translateY(-50%);display:flex;align-items:center;gap:12px">
    <div style="display:flex;align-items:center;gap:8px">
      <label style="font-size:13px;font-weight:600;color:#fff">แหล่งข้อมูล</label>
      <div class="ymt" style="border-color:rgba(255,255,255,.5)">
        <button class="ymb" id="headerInfoShow" onclick="toggleInfo(true)" style="background:rgba(255,255,255,.15);color:#fff;padding:5px 14px;font-size:12px">แสดง</button>
        <button class="ymb active" id="headerInfoHide" onclick="toggleInfo(false)" style="background:rgba(255,255,255,.4);color:#fff;padding:5px 14px;font-size:12px">ซ่อน</button>
      </div>
    </div>
    <div class="theme-toggle" onclick="toggleTheme()" style="position:static;transform:none">
      <span id="themeIcon">&#9788;</span>
      <div class="theme-switch" id="themeSwitch"></div>
      <span id="themeIcon2">&#9790;</span>
    </div>
  </div>
</div>

<div class="container">

<!-- Info Section -->
<div class="info-section">
  <div class="info-content collapsed" id="infoContent" style="max-height:0">
    <div class="file-list">
      <h3 style="color:var(--heading)">ข้อมูลที่โหลดแล้ว</h3>
      <div id="fileList"></div>
      <div style="margin-top:16px;margin-bottom:8px;display:flex;align-items:center;gap:8px">
        <label style="font-size:13px;font-weight:600;color:var(--heading)">สรุปข้อมูลที่มี</label>
        <select id="datasetYearMode" onchange="buildDatasetTable()" style="padding:4px 8px;border:1px solid var(--border);border-radius:6px;font-size:13px;background:var(--card);color:var(--text)">
          <option value="fiscal">ปีงบประมาณ</option>
          <option value="calendar">ปีปฏิทิน</option>
        </select>
        <span style="font-size:12px;color:var(--sub2)">(ตัวเลข = จำนวนเดือนที่มีข้อมูล)</span>
      </div>
      <div id="statsRow"></div>
    </div>
  </div>
</div>

<!-- Tab: KPI จุดซ่อมท่อ -->
<div class="chart-card">
  <div class="card-header">
    <h3 style="color:var(--heading)">&#x1F5FA; KPI จุดซ่อมท่อ ในระบบ PWA SMART 1662</h3>
    <button class="card-toggle" onclick="toggleCard(this)">&#9650;</button>
  </div>
  <div class="card-body">
    <div class="controls">
      <div class="control-group">
        <label>เลือกเดือน</label>
        <select id="gisMonth" onchange="gisRender()"></select>
      </div>
      <div class="control-group">
        <label>เกณฑ์วัด กปภ.</label>
        <select id="gisThreshold1" onchange="gisRender()">
          <option value="70">70%</option>
          <option value="80" selected>80%</option>
          <option value="90">90%</option>
          <option value="100">100%</option>
        </select>
      </div>
      <div class="control-group">
        <label>เกณฑ์ติดตาม</label>
        <select id="gisThreshold2" onchange="gisRender()">
          <option value="70">70%</option>
          <option value="80">80%</option>
          <option value="90">90%</option>
          <option value="100" selected>100%</option>
        </select>
      </div>
      <div class="control-group">
        <label>ประเภทกราฟ (แท่ง)</label>
        <select id="gisBarType" onchange="gisRender()">
          <option value="bar">กราฟแท่ง</option>
          <option value="line">กราฟเส้นโค้ง</option>
          <option value="straight">กราฟเส้นตรง</option>
        </select>
      </div>
    </div>

    <div class="chart-container" id="gisChartWrap">
      <canvas id="gisChart"></canvas>
    </div>

    <div class="export-bar">
      <button class="export-btn" onclick="gisResetChart()" title="รีเซ็ตขนาดกราฟ">&#8634; รีเซ็ต</button>
      <label class="export-btn" style="cursor:pointer"><input type="checkbox" id="gisShowValues" onchange="gisRender()" style="margin-right:4px">แสดงค่า</label>
      <button class="export-btn" onclick="gisExportPNG()"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:middle"><path d="M21 19V5a2 2 0 00-2-2H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg></button>
      <button class="export-btn" onclick="gisCopyChart()"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:middle"><path d="M16 1H4a2 2 0 00-2 2v14h2V3h12V1zm3 4H8a2 2 0 00-2 2v14a2 2 0 002 2h11a2 2 0 002-2V7a2 2 0 00-2-2zm0 16H8V7h11v14z"/></svg></button>
      <button class="export-btn" onclick="gisExportExcel()"><svg width="20" height="20" viewBox="0 0 24 24" style="vertical-align:middle"><rect width="24" height="24" rx="3" fill="#217346"/><path d="M6 6l4 6-4 6h3l2.5-4 2.5 4h3l-4-6 4-6h-3L12 10 9.5 6H6z" fill="#fff"/></svg></button>
      <button class="export-btn" onclick="gisExportPPTX()"><svg width="20" height="20" viewBox="0 0 24 24" style="vertical-align:middle"><rect width="24" height="24" rx="3" fill="#D04423"/><path d="M7 5v14h2v-5h3a4 4 0 000-8H7zm2 2h3a2 2 0 010 4H9V7z" fill="#fff"/></svg></button>
    </div>

    <!-- Data Table -->
    <div id="gisTableContainer" style="margin-top:24px;overflow-x:auto"></div>

    <!-- KPI Summary -->
    <div id="gisSummary" class="kpi-summary"></div>

    <div class="export-bar" style="margin-top:8px">
      <button class="export-btn" onclick="gisExportTableExcel()"><svg width="20" height="20" viewBox="0 0 24 24" style="vertical-align:middle"><rect width="24" height="24" rx="3" fill="#217346"/><path d="M6 6l4 6-4 6h3l2.5-4 2.5 4h3l-4-6 4-6h-3L12 10 9.5 6H6z" fill="#fff"/></svg> ส่งออกตาราง</button>
    </div>
  </div>
</div>

</div>

// ==================== FILE TAGS ====================
function initInfo(){
    var fl=document.getElementById('fileList');
    if(!fl)return;
    var label=document.createElement('div');
    label.style.cssText='font-weight:600;font-size:13px;color:var(--heading);margin-bottom:4px';
    label.textContent='ข้อมูลจุดซ่อมท่อ (GIS):';
    fl.appendChild(label);

    // Group months by fiscal year
    var fyMap={};
    MONTHS.forEach(function(mk){
        var parts=mk.split('-');
        var yy=parseInt(parts[0],10);var mm=parseInt(parts[1],10);
        var fy=(mm>=10)?(2500+yy+1):(2500+yy);
        if(!fyMap[fy])fyMap[fy]=0;
        fyMap[fy]++;
    });
    var fyKeys=Object.keys(fyMap).map(Number).sort();
    fyKeys.forEach(function(fy){
        var t=document.createElement('span');
        t.style.cssText='display:inline-block;padding:4px 12px;margin:3px 4px;border:2px solid #00838f;border-radius:20px;font-size:12px;font-weight:600;color:#00838f';
        t.textContent='ปีงบ '+fy+' ('+BRANCHES.length+' สาขา, '+fyMap[fy]+' เดือน)';
        fl.appendChild(t);
    });

    buildDatasetTable();
}

function buildDatasetTable(){
    var isFiscal=document.getElementById('datasetYearMode').value==='fiscal';
    var yearMonthCount={};
    MONTHS.forEach(function(mk){
        var parts=mk.split('-');
        var yy=parseInt(parts[0],10);var mm=parseInt(parts[1],10);
        var yr;
        if(isFiscal) yr=(mm>=10)?(2500+yy+1):(2500+yy);
        else yr=2500+yy;
        yearMonthCount[yr]=(yearMonthCount[yr]||0)+1;
    });
    var yearList=Object.keys(yearMonthCount).map(Number).sort();

    var thStyle='padding:8px 10px;background:#004d40;color:#fff;font-weight:700;font-size:13px;border:1px solid #00695c;white-space:nowrap';
    var tdBase='padding:6px 10px;border:1px solid #d1d5db;font-size:13px;';
    var html='<table style="width:100%;border-collapse:collapse;border:2px solid #00695c;margin-bottom:8px">';
    html+='<thead><tr>';
    html+='<th style="'+thStyle+';text-align:left">ชุดข้อมูล</th>';
    for(var i=0;i<yearList.length;i++){
        html+='<th style="'+thStyle+';text-align:center">ปี '+(yearList[i]%100)+'</th>';
    }
    html+='</tr></thead><tbody>';
    html+='<tr>';
    html+='<td style="'+tdBase+'background:#e0f2f1;font-weight:700;color:#00695c;white-space:nowrap">จุดซ่อมท่อ (GIS)</td>';
    for(var i=0;i<yearList.length;i++){
        var mc=yearMonthCount[yearList[i]];
        var cellColor='',cellWeight='';
        if(mc===12){cellColor='color:#16a34a;';cellWeight='font-weight:700;';}
        else if(mc>0){cellColor='color:#00838f;';cellWeight='font-weight:700;';}
        else{cellColor='color:#9ca3af;';}
        html+='<td style="'+tdBase+'background:#e0f2f1;text-align:center;'+cellColor+cellWeight+'">'+(mc>0?mc:'—')+'</td>';
    }
    html+='</tr>';
    html+='</tbody></table>';
    document.getElementById('statsRow').innerHTML=html;
}

// ==================== MONTH SELECTOR ====================
function initMonthSelect(){
    var sel=document.getElementById('gisMonth');
    for(var i=MONTHS.length-1;i>=0;i--){
        var mk=MONTHS[i];
        var parts=mk.split('-');
        var yy=parseInt(parts[0],10);var mm=parseInt(parts[1],10);
        var opt=document.createElement('option');
        opt.value=mk;
        opt.textContent=MONTH_NAMES[mm<10?'0'+mm:''+mm]+' '+( 2500+yy);
        sel.appendChild(opt);
    }
}

// ==================== CHART ====================
var gisChartObj=null;

function gisRender(){
    var mk=document.getElementById('gisMonth').value;
    var th1=parseFloat(document.getElementById('gisThreshold1').value);
    var th2=parseFloat(document.getElementById('gisThreshold2').value);
    var barType=document.getElementById('gisBarType').value;
    var showVals=document.getElementById('gisShowValues').checked;

    var monthData=DATA.data[mk]||{};
    var labels=[];
    var closedArr=[];
    var completeArr=[];
    var scoreArr=[];

    BRANCHES.forEach(function(b){
        labels.push(b);
        var d=monthData[b]||{closed:0,complete:0,score:0};
        closedArr.push(d.closed);
        completeArr.push(d.complete);
        scoreArr.push(d.score);
    });

    // Parse month label
    var parts=mk.split('-');
    var yy=parseInt(parts[0],10);var mm=parseInt(parts[1],10);
    var titleMonth=MONTH_NAMES[mm<10?'0'+mm:''+mm]+' พ.ศ.'+(2500+yy);

    if(gisChartObj){gisChartObj.destroy();gisChartObj=null;}
    var ctx=document.getElementById('gisChart').getContext('2d');

    var barDatasets=[];
    var isLine=(barType==='line'||barType==='straight');
    var tension=barType==='line'?0.3:0;

    if(isLine){
        barDatasets.push({
            label:'รวมปิดงานซ่อม',data:closedArr,
            borderColor:'#00838f',backgroundColor:'rgba(0,131,143,0.15)',
            type:'line',yAxisID:'y',tension:tension,fill:true,pointRadius:4,order:2
        });
        barDatasets.push({
            label:'รวมงานซ่อมที่ครบถ้วน',data:completeArr,
            borderColor:'#26c6da',backgroundColor:'rgba(38,198,218,0.15)',
            type:'line',yAxisID:'y',tension:tension,fill:true,pointRadius:4,order:3
        });
    } else {
        barDatasets.push({
            label:'รวมปิดงานซ่อม',data:closedArr,
            backgroundColor:'#00838f',borderColor:'#004d40',borderWidth:1,
            type:'bar',yAxisID:'y',order:2,barPercentage:0.8,categoryPercentage:0.85
        });
        barDatasets.push({
            label:'รวมงานซ่อมที่ครบถ้วน',data:completeArr,
            backgroundColor:'#4dd0e1',borderColor:'#00838f',borderWidth:1,
            type:'bar',yAxisID:'y',order:3,barPercentage:0.8,categoryPercentage:0.85
        });
    }

    // KPI line on right axis
    barDatasets.push({
        label:'คะแนน KPI',data:scoreArr,
        borderColor:'#e53935',backgroundColor:'rgba(229,57,53,0.1)',
        type:'line',yAxisID:'y1',tension:0.3,fill:false,
        pointRadius:5,pointBackgroundColor:function(ctx2){
            var v=ctx2.raw;
            if(v>=th2) return '#4caf50';
            if(v>=th1) return '#ff9800';
            return '#e53935';
        },
        pointBorderColor:'#fff',pointBorderWidth:2,
        borderWidth:3,order:1
    });

    gisChartObj=new Chart(ctx,{
        type:'bar',
        data:{labels:labels,datasets:barDatasets},
        options:{
            responsive:true,
            maintainAspectRatio:false,
            plugins:{
                title:{display:true,text:'คะแนน KPI จุดซ่อมท่อ ในระบบ PWA SMART 1662 กปภ.ข.1 — ข้อมูล ณ '+titleMonth,font:{size:16,weight:'bold'},color:getComputedStyle(document.body).getPropertyValue('--heading').trim()},
                legend:{display:true,position:'bottom',labels:{font:{size:12},boxWidth:14,usePointStyle:false}},
                tooltip:{callbacks:{label:function(c){var v=c.parsed.y;if(v==null)return 'ไม่มีข้อมูล';var suffix=c.dataset.yAxisID==='y1'?'%':'';return (c.dataset.label||'')+': '+v.toLocaleString('th-TH',{maximumFractionDigits:2})+suffix;}}},
                datalabels:{display:showVals,color:function(ctx2){return ctx2.dataset.yAxisID==='y1'?'#e53935':'#004d40';},font:{size:11,weight:'bold'},anchor:'end',align:'top',formatter:function(v,ctx2){if(v==null||v===0)return '';return ctx2.dataset.yAxisID==='y1'?v.toFixed(1)+'%':v.toLocaleString();}}
            },
            scales:{
                x:{ticks:{maxRotation:60,font:{size:12}},grid:{display:false}},
                y:{type:'linear',position:'left',beginAtZero:true,title:{display:true,text:'จำนวนงาน',font:{size:13}},ticks:{callback:function(v){return v.toLocaleString('th-TH');}}},
                y1:{type:'linear',position:'right',min:0,max:110,title:{display:true,text:'คะแนน KPI (%)',font:{size:13},color:'#e53935'},ticks:{callback:function(v){return v+'%';},color:'#e53935'},grid:{drawOnChartArea:false}}
            },
            annotation:undefined
        },
        plugins:[{
            id:'thresholdLines',
            afterDraw:function(chart){
                var yScale=chart.scales.y1;
                var ctx2=chart.ctx;
                // Threshold 1 (กปภ. กำหนด)
                var y1=yScale.getPixelForValue(th1);
                ctx2.save();
                ctx2.setLineDash([8,4]);
                ctx2.strokeStyle='#e53935';ctx2.lineWidth=2;
                ctx2.beginPath();ctx2.moveTo(chart.chartArea.left,y1);ctx2.lineTo(chart.chartArea.right,y1);ctx2.stroke();
                ctx2.fillStyle='#e53935';ctx2.font='bold 12px sans-serif';ctx2.textAlign='right';
                ctx2.fillText('เกณฑ์ กปภ. กำหนด '+th1+'%',chart.chartArea.right-5,y1-5);
                // Threshold 2 (ติดตาม)
                var y2=yScale.getPixelForValue(th2);
                ctx2.strokeStyle='#1565c0';ctx2.lineWidth=2;
                ctx2.beginPath();ctx2.moveTo(chart.chartArea.left,y2);ctx2.lineTo(chart.chartArea.right,y2);ctx2.stroke();
                ctx2.fillStyle='#1565c0';ctx2.font='bold 12px sans-serif';
                ctx2.fillText('เกณฑ์ กปภ.ข.1 ติดตาม '+th2+'%',chart.chartArea.right-5,y2-5);
                ctx2.restore();
            }
        }]
    });

    // Render table
    gisRenderTable(labels,closedArr,completeArr,scoreArr,th1,th2);

    // Render KPI summary
    var totalClosed=0,totalComplete=0;
    closedArr.forEach(function(v){totalClosed+=v;});
    completeArr.forEach(function(v){totalComplete+=v;});
    var kpiTotal=totalClosed>0?((totalComplete/totalClosed)*100):0;
    document.getElementById('gisSummary').innerHTML='คะแนน KPI กปภ.ข.1 : <span style="font-size:28px">'+kpiTotal.toFixed(2)+'</span> %';
}

function gisRenderTable(labels,closed,complete,score,th1,th2){
    var thStyle='padding:8px 6px;background:#004d40;color:#fff;font-weight:700;font-size:12px;border:1px solid #00695c;text-align:center;white-space:nowrap';
    var tdBase='padding:6px 8px;border:1px solid #d1d5db;font-size:12px;text-align:center;';

    var html='<table style="width:100%;border-collapse:collapse;border:2px solid #00695c">';
    html+='<thead><tr>';
    html+='<th style="'+thStyle+';text-align:left;width:120px"></th>';
    for(var i=0;i<labels.length;i++){
        html+='<th style="'+thStyle+'">'+labels[i]+'</th>';
    }
    html+='</tr></thead><tbody>';

    // Row 1: รวมปิดงานซ่อม
    html+='<tr>';
    html+='<td style="'+tdBase+'text-align:left;font-weight:700;color:#00838f;background:#e0f2f1"><span style="display:inline-block;width:10px;height:10px;background:#00838f;border-radius:50%;margin-right:4px"></span>รวมปิดงานซ่อม</td>';
    for(var i=0;i<closed.length;i++){
        html+='<td style="'+tdBase+'background:#e0f2f1;font-weight:600">'+closed[i].toLocaleString()+'</td>';
    }
    html+='</tr>';

    // Row 2: รวมงานซ่อมที่ครบถ้วน
    html+='<tr>';
    html+='<td style="'+tdBase+'text-align:left;font-weight:700;color:#00838f;background:#e0f2f1"><span style="display:inline-block;width:10px;height:10px;background:#4dd0e1;border-radius:50%;margin-right:4px"></span>รวมงานซ่อมที่ครบถ้วน</td>';
    for(var i=0;i<complete.length;i++){
        html+='<td style="'+tdBase+'background:#e0f2f1;font-weight:600">'+complete[i].toLocaleString()+'</td>';
    }
    html+='</tr>';

    // Row 3: คะแนน KPI
    html+='<tr>';
    html+='<td style="'+tdBase+'text-align:left;font-weight:700;color:#e53935;background:#fff0f0"><span style="display:inline-block;width:10px;height:10px;background:#e53935;border-radius:50%;margin-right:4px"></span>คะแนน KPI</td>';
    for(var i=0;i<score.length;i++){
        var s=score[i];
        var bgColor,txtColor;
        if(s>=th2){bgColor='#e8f5e9';txtColor='#2e7d32';}
        else if(s>=th1){bgColor='#fff3e0';txtColor='#e65100';}
        else{bgColor='#ffebee';txtColor='#c62828';}
        html+='<td style="'+tdBase+'background:'+bgColor+';color:'+txtColor+';font-weight:700">'+s.toFixed(2)+'</td>';
    }
    html+='</tr>';

    html+='</tbody></table>';
    document.getElementById('gisTableContainer').innerHTML=html;
}

function gisExportExcel(){

    ws.getRow(1).font={bold:true};
    ws.columns.forEach(function(c){c.width=20;});
    wb.xlsx.writeBuffer().then(function(buf){
        var blob=new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
        var link=document.createElement('a');
        link.download='KPI_จุดซ่อมท่อ_'+mk+'.xlsx';
        link.href=URL.createObjectURL(blob);
        link.click();
    });
}

function gisExportTableExcel(){
    gisExportExcel();
}

function gisExportPPTX(){
    if(typeof PptxGenJS==='undefined'){alert('PptxGenJS ยังโหลดไม่เสร็จ');return;}
    var canvas=document.getElementById('gisChart');
    var imgData=canvas.toDataURL('image/png');
    var pptx=new PptxGenJS();
    var slide=pptx.addSlide();
    slide.addImage({data:imgData,x:0.5,y:0.5,w:9,h:5});
    pptx.writeFile({fileName:'KPI_จุดซ่อมท่อ.pptx'});
}

if(typeof Chart!=='undefined'&&typeof ChartDataLabels!=='undefined'){
    Chart.register(ChartDataLabels);
    Chart.defaults.plugins.datalabels={display:false};
}

initInfo();
initMonthSelect();
gisRender();
